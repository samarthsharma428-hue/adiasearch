name: adiasearch
description: Premium universal AI-powered search, fact-checking, source comparison, and deep research engine.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^6.1.0
  provider: ^6.0.5
  http: ^1.1.0
  intl: ^0.18.1
  url_launcher: ^6.1.12
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
